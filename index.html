<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Assignment</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    .flyer-wrap {
      position: relative;
      width: 100%;
      max-width: 1024px;
      margin: 0 auto;
      line-height: 0;
    }

    .flyer-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      display: block;
      text-decoration: none;
    }

    /* ASAP hotspot */
    .hotspot-a {
      left: 26.8%;
      top: 80.8%;
      width: 45.5%;
      height: 6.2%;
    }

    /* Flower hotspot */
    .hotspot-b {
      left: 47.2%;
      top: 46.8%;
      width: 6.5%;
      height: 5.5%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="flyer-wrap">
    <img
      src="flyer.png"
      alt="The Last Assignment flyer"
    />

    <a
      class="hotspot hotspot-a"
      href="https://www.thelastassignment.com/60-second-clue-a"
      aria-label="60 second clue A"
      title="60 second clue A"
    ></a>

    <a
      class="hotspot hotspot-b"
      href="https://www.thelastassignment.com/60-second-clue-b"
      aria-label="60 second clue B"
      title="60 second clue B"
    ></a>
  </div>
</body>
</html>
