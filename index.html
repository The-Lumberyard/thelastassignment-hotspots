<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Assignment</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    .flyer-wrap {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .flyer-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      display: block;
      text-decoration: none;
      z-index: 10;
      cursor: pointer;
      box-sizing: border-box;
    }

    .hotspot-a {
      left: 26.8%;
      top: 85.8%;
      width: 25.5%;
      height: 6.2%;
      background: rgba(255,0,0,0.35);
      border: 2px solid rgba(255,255,255,0.8);
    }

    .hotspot-b {
      left: 47.2%;
      top: 46.8%;
      width: 6.5%;
      height: 5.5%;
      background: rgba(0,255,0,0.35);
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="flyer-wrap">
    <img src="flyer.png" alt="The Last Assignment flyer" />

    <a
      class="hotspot hotspot-a"
      href="https://www.thelastassignment.com/60-second-clue-a"
      aria-label="60 second clue A"
      title="60 second clue A"
    ></a>

    <a
      class="hotspot hotspot-b"
      href="https://www.thelastassignment.com/60-second-clue-b"
      aria-label="60 second clue B"
      title="60 second clue B"
    ></a>
  </div>
</body>
</html>
