<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Last Assignment</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
    }

    body {
      padding: 10px;
      box-sizing: border-box;
    }

    .flyer-wrap {
      position: relative;
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      line-height: 0;
    }

    .flyer-wrap img {
      display: block;
      width: 100%;
      height: auto;
    }

    .hotspot {
      position: absolute;
      display: block;
      text-decoration: none;
      z-index: 10;
      cursor: pointer;
      box-sizing: border-box;
      background: rgba(255, 0, 0, 0);
      border: none;
    }

    .hotspot-a {
      left: 47.2%;
      top: 85.4%;
      width: 13.5%;
      height: 3.2%;
    }

    .hotspot-b {
      left: 44.2%;
      top: 44.2%;
      width: 3.8%;
      height: 4.2%;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="flyer-wrap">
    <img src="flyer.png" alt="The Last Assignment flyer" />

    <a
      class="hotspot hotspot-a"
      href="https://www.thelastassignment.com/60-second-clue-a"
      aria-label="60 Second Clue A"
      title="60 Second Clue A"
    ></a>

    <a
      class="hotspot hotspot-b"
      href="https://www.thelastassignment.com/60-second-clue-b"
      aria-label="60 Second Clue B"
      title="60 Second Clue B"
    ></a>
  </div>
</body>
</html>
